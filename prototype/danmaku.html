<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>弹幕渲染层 - AI弹幕工具</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #000;
      overflow: hidden;
    }
    
    .danmaku-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      overflow: hidden;
    }
    
    .danmaku-item {
      position: absolute;
      white-space: nowrap;
      font-size: 24px;
      font-weight: 500;
      text-shadow: 
        -1px -1px 0 #000,
        1px -1px 0 #000,
        -1px 1px 0 #000,
        1px 1px 0 #000,
        0 0 4px rgba(0,0,0,0.8);
      pointer-events: none;
      will-change: transform;
      user-select: none;
    }
    
    /* 颜色变体 */
    .danmaku-item.white {
      color: #ffffff;
    }
    
    .danmaku-item.yellow {
      color: #ffd700;
    }
    
    .danmaku-item.cyan {
      color: #00ffff;
    }
    
    .danmaku-item.pink {
      color: #ff69b4;
    }
    
    .danmaku-item.green {
      color: #7fff00;
    }
    
    .danmaku-item.orange {
      color: #ffa500;
    }
    
    .danmaku-item.purple {
      color: #da70d6;
    }
    
    .danmaku-item.red {
      color: #ff6b6b;
    }
    
    /* 顶部固定弹幕 */
    .danmaku-item.top {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      animation: fadeInOut 5s ease-in-out forwards;
    }
    
    @keyframes fadeInOut {
      0% {
        opacity: 0;
        transform: translateX(-50%) scale(0.8);
      }
      10% {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }
      90% {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateX(-50%) scale(0.8);
      }
    }
    
    /* 控制面板 */
    .control-panel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 41, 59, 0.95);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 12px;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      backdrop-filter: blur(10px);
      pointer-events: auto;
      z-index: 1000;
    }
    
    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .control-label {
      font-size: 12px;
      color: #94a3b8;
      white-space: nowrap;
    }
    
    .control-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(99, 102, 241, 0.2);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    
    .control-btn:hover {
      background: rgba(99, 102, 241, 0.4);
    }
    
    .control-btn.active {
      background: #6366f1;
    }
    
    .slider-control {
      width: 100px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #334155;
      border-radius: 2px;
      outline: none;
    }
    
    .slider-control::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
    }
    
    .divider {
      width: 1px;
      height: 24px;
      background: #334155;
    }
    
    .stats-overlay {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(30, 41, 59, 0.9);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      color: #94a3b8;
      pointer-events: auto;
      backdrop-filter: blur(10px);
    }
    
    .stats-item {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 4px;
    }
    
    .stats-item:last-child {
      margin-bottom: 0;
    }
    
    .stats-value {
      color: #fff;
      font-weight: 600;
    }
    
    .demo-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      z-index: -1;
    }
    
    .demo-bg::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
    }
    
    /* 暂停遮罩 */
    .pause-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    
    .pause-overlay.show {
      display: flex;
    }
    
    .pause-text {
      font-size: 48px;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 700;
      letter-spacing: 10px;
    }
  </style>
</head>
<body>
  <div class="demo-bg"></div>
  
  <!-- 弹幕容器 -->
  <div class="danmaku-container" id="danmakuContainer"></div>
  
  <!-- 暂停遮罩 -->
  <div class="pause-overlay" id="pauseOverlay">
    <div class="pause-text">已暂停</div>
  </div>
  
  <!-- 统计信息 -->
  <div class="stats-overlay">
    <div class="stats-item">
      <span>当前弹幕</span>
      <span class="stats-value" id="activeCount">0</span>
    </div>
    <div class="stats-item">
      <span>队列待渲染</span>
      <span class="stats-value" id="queueCount">0</span>
    </div>
    <div class="stats-item">
      <span>总生成数</span>
      <span class="stats-value" id="totalCount">0</span>
    </div>
  </div>
  
  <!-- 控制面板 -->
  <div class="control-panel">
    <div class="control-group">
      <button class="control-btn active" id="btnPlay" onclick="togglePlay()">▶</button>
      <button class="control-btn" id="btnPause" onclick="togglePause()">⏸</button>
      <button class="control-btn" onclick="clearDanmaku()">🗑</button>
    </div>
    
    <div class="divider"></div>
    
    <div class="control-group">
      <span class="control-label">速度</span>
      <input type="range" class="slider-control" min="1" max="10" value="3" id="speedSlider" oninput="updateSpeed(this.value)">
    </div>
    
    <div class="divider"></div>
    
    <div class="control-group">
      <span class="control-label">透明度</span>
      <input type="range" class="slider-control" min="10" max="100" value="100" id="opacitySlider" oninput="updateOpacity(this.value)">
    </div>
    
    <div class="divider"></div>
    
    <div class="control-group">
      <button class="control-btn" onclick="addTestDanmaku()">+ 测试</button>
      <button class="control-btn" onclick="toggleTopDanmaku()">📌</button>
    </div>
  </div>

  <script>
    // 弹幕系统配置
    const config = {
      speed: 3,
      opacity: 1,
      fontSize: 24,
      tracks: 12,
      trackHeight: 40,
      isRunning: true,
      isPaused: false
    };
    
    // 弹幕数据
    let danmakuList = [];
    let danmakuId = 0;
    let activeDanmaku = 0;
    let totalDanmaku = 0;
    
    // 示例弹幕内容
    const sampleTexts = [
      '这也太厉害了吧！',
      '前方高能！',
      '哈哈哈笑死我了',
      '666666',
      '主播太强了',
      '这波操作满分',
      '学到了学到了',
      '卧槽，离谱',
      '神仙打架',
      '膜拜大佬',
      '这就是传说中的大神吗',
      '太强了太强了',
      '我直接好家伙',
      '这波我在大气层',
      '细啊，太细了',
      '这就是职业选手吗',
      '我悟了',
      '教科书级别',
      '离谱他妈给离谱开门',
      'yyds'
    ];
    
    const colors = ['white', 'yellow', 'cyan', 'pink', 'green', 'orange', 'purple', 'red'];
    
    // 创建弹幕
    function createDanmaku(text, options = {}) {
      const container = document.getElementById('danmakuContainer');
      const id = danmakuId++;
      
      const danmaku = document.createElement('div');
      danmaku.className = `danmaku-item ${options.color || colors[Math.floor(Math.random() * colors.length)]}`;
      danmaku.textContent = text || sampleTexts[Math.floor(Math.random() * sampleTexts.length)];
      danmaku.style.opacity = config.opacity;
      
      if (options.isTop) {
        danmaku.classList.add('top');
        danmaku.style.top = `${Math.random() * 30 + 10}%`;
        container.appendChild(danmaku);
        
        setTimeout(() => {
          danmaku.remove();
          activeDanmaku--;
          updateStats();
        }, 5000);
      } else {
        const track = Math.floor(Math.random() * config.tracks);
        danmaku.style.top = `${track * config.trackHeight + 10}px`;
        danmaku.style.left = '100%';
        container.appendChild(danmaku);
        
        const width = danmaku.offsetWidth;
        const duration = (window.innerWidth + width) / (config.speed * 50);
        
        danmaku.animate([
          { transform: 'translateX(0)' },
          { transform: `translateX(-${window.innerWidth + width + 100}px)` }
        ], {
          duration: duration * 1000,
          easing: 'linear'
        }).onfinish = () => {
          danmaku.remove();
          activeDanmaku--;
          updateStats();
        };
      }
      
      activeDanmaku++;
      totalDanmaku++;
      updateStats();
      
      return id;
    }
    
    // 更新统计
    function updateStats() {
      document.getElementById('activeCount').textContent = activeDanmaku;
      document.getElementById('queueCount').textContent = Math.floor(Math.random() * 10);
      document.getElementById('totalCount').textContent = totalDanmaku;
    }
    
    // 添加测试弹幕
    function addTestDanmaku() {
      for (let i = 0; i < 5; i++) {
        setTimeout(() => createDanmaku(), i * 200);
      }
    }
    
    // 切换顶部弹幕
    function toggleTopDanmaku() {
      createDanmaku('⭐ 这是一条置顶弹幕！', { isTop: true, color: 'yellow' });
    }
    
    // 控制功能
    function togglePlay() {
      config.isRunning = true;
      config.isPaused = false;
      document.getElementById('btnPlay').classList.add('active');
      document.getElementById('btnPause').classList.remove('active');
      document.getElementById('pauseOverlay').classList.remove('show');
    }
    
    function togglePause() {
      config.isPaused = !config.isPaused;
      if (config.isPaused) {
        document.getElementById('btnPause').classList.add('active');
        document.getElementById('btnPlay').classList.remove('active');
        document.getElementById('pauseOverlay').classList.add('show');
      } else {
        document.getElementById('btnPause').classList.remove('active');
        document.getElementById('btnPlay').classList.add('active');
        document.getElementById('pauseOverlay').classList.remove('show');
      }
    }
    
    function clearDanmaku() {
      document.getElementById('danmakuContainer').innerHTML = '';
      activeDanmaku = 0;
      updateStats();
    }
    
    function updateSpeed(value) {
      config.speed = parseInt(value);
    }
    
    function updateOpacity(value) {
      config.opacity = value / 100;
      document.querySelectorAll('.danmaku-item').forEach(item => {
        item.style.opacity = config.opacity;
      });
    }
    
    // 自动发送弹幕
    function autoSendDanmaku() {
      if (config.isRunning && !config.isPaused && activeDanmaku < 30) {
        createDanmaku();
      }
      setTimeout(autoSendDanmaku, Math.random() * 1000 + 500);
    }
    
    // 启动
    autoSendDanmaku();
    
    // 初始弹幕
    setTimeout(() => {
      for (let i = 0; i < 10; i++) {
        setTimeout(() => createDanmaku(), i * 300);
      }
    }, 500);
  </script>
</body>
</html>
